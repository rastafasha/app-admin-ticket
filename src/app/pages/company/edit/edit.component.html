<div class="modal fade" id="editCompany" tabindex="-1" aria-labelledby="catModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="catModalLabel">{{title}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                    (click)="onClose()"></button>
            </div>
            <div class="modal-body">
                <!-- <app-loading *ngIf="isLoading"></app-loading> -->
                <div class="container">
                    <div class="row">
                        <form [formGroup]="companyForm" method="POST" (ngSubmit)="onSubmit()"
                            class="form-horizontal form-material" *ngIf="!loading">

                            <div class="row">
                                <div class="col-xs-12 col-sm-8">

                                <div class="row">
                                    <div class="form-group col-xs-12 col-sm-6">
                                    <label class="col-md-3">Título <span class="text-danger">*</span></label>
                                    <div class="">
                                        <input type="text" formControlName="name" class="form-control"
                                            placeholder="Title">

                                    </div>
                                </div>
                                <div class="form-group col-xs-12 col-sm-6">
                                    <label class="col-md-3">Pais <span class="text-danger">*</span></label>
                                    <div class="">
                                        <select formControlName="pais_id" class="form-control" name="pais_id">
                                            <option *ngFor="let pais of countries" [value]="pais.id">
                                                {{pais.code}} | {{pais.title}}
                                            </option>
                                        </select>
                                    </div>
                                </div>
                                </div>
                                <div class="form-group col-12">
                                <label class="col-md-3">Descripción </label>
                                <div class="col-xs-12">
                                    <!-- <ckeditor [(data)]="editorData" formControlName="description"  class="form-control"> </ckeditor> -->
                                    <textarea formControlName="description" class="form-control" rows="5"></textarea>
                                </div>
                            </div>

                            </div>

                            
                            <div class="col-xs-12 col-sm-4">

                                <div class="form-group ">
                                    <label class="col-12">Imagen Fondo (peso max: 500kb | medidas max:
                                        1920x1080px)</label>
                                    <div class="col-md-9">
                                        <!-- Foto -->
                                        <div class="form-group local-top-form">
                                            <div class="settings-btn upload-files-avator">
                                                <label for="file" class="upload labelgoogle">
                                                    <input type="file" accept="image/*" name="image" id="file"
                                                        (change)="loadFile($event)" class="hide-input input">
                                                    <span class="label__name">
                                                        {{'Select a Photo'}}
                                                    </span>
                                                </label>
                                            </div>
                                        </div>
                                        <img [src]="company?.avatar | imagenPipe: 'companies'" class=" shadow"
                                            style="width: 100%; height: auto;">
                                        <div *ngIf="FILE_AVATAR">
                                            <img [src]="IMAGE_PREVISUALIZA | imagenPipe: 'companies'"
                                                style="width: 250px;" alt="">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group form-row">
                                <label class="col-md-3"></label>
                                <div class="col-md-9">
                                    <input type="hidden" formControlName="id">
                                    <button type="submit" [disabled]="!companyForm.valid"
                                        class="btn btn-outline-success">Guardar</button>
                                </div>
                            </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    (click)="onClose()">Cerrar</button>
            </div>
        </div>
    </div>
</div>

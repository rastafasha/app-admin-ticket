<!-- =======| Main |======= -->

<app-loading *ngIf="isLoading"></app-loading>
<div class="modal fade" id="viewCompany" tabindex="-1" aria-labelledby="catModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="catModalLabel">{{title}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                    (click)="onClose()"></button>
            </div>
            <div class="modal-body">
                 <section class="section profile">
            <div class="row">
                <div class="col-12">

                    <div class="card border-radio shadow">
                        <div class="card-body profile-card pt-4  fichasmall">
                            <div class="inffichasmall">
                                <div class="fotoeditprofile">
                                    <div class="col-xs-6 col-sm-3" *ngIf="role==='SUPERADMIN' || role==='ADMIN' || role==='PARTNER'">
                                </div>
                                <img [src]="companySelected?.avatar | imagenPipe: 'companies'" class="imagecircle shadow"
                                    alt="">
                                </div>
                                <h5 style="margin-top: 15px;">{{companySelected?.name}} </h5>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 ">

                    <div class="card border-radio">
                        <div class="card-body pt-3">
                            <!-- Bordered Tabs -->
                            <div *ngIf="role === 'GUEST'">
                                <ul class="nav nav-tabs nav-tabs-bordered">

                                    <li class="nav-item">
                                        <button class="nav-link active" data-bs-toggle="tab"
                                            data-bs-target="#profile-overview">Detalles</button>
                                    </li>
                                    <!-- <li class="nav-item">
                                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#profile-change-password">Cambiar
                    Contraseña</button>
                                    </li> -->

                                </ul>

                            </div>

                            <div>
                                <ul class="nav nav-tabs nav-tabs-bordered">
                                    <li class="nav-item">
                                        <button class="nav-link active" (click)="optionSelected(1)"
                                            [ngClass]="{'active': option_selected === 1}" data-bs-toggle="tab"
                                            data-bs-target="#profile-overview">Detalles</button>
                                    </li>
                                    <li class="nav-item">
                                        <button class="nav-link" (click)="optionSelected(2)"
                                            [ngClass]="{'active': option_selected === 2}" data-bs-toggle="tab"
                                            data-bs-target="#hijos">Eventos</button>
                                    </li>
                                    <!-- *ngIf="role==='ADMIN'|| role === 'SUPERADMIN'" -->
                                    <li class="nav-item"
                                        >
                                        <button class="nav-link" (click)="optionSelected(3)"
                                            [ngClass]="{'active': option_selected === 3}" data-bs-toggle="tab"
                                            data-bs-target="#examenes">Colaboradores</button>
                                    </li>

                                </ul>

                            </div>
                            <div class="tab-content pt-2">
                                <!-- detalles -->
                                <div class="tab-pane fade show active profile-overview" *ngIf="option_selected === 1 "
                                    id="profile-overview">

                                    <br />

                                    <div class="row">
                                        <div class="col-xs-6 col-sm-4">
                                            <div class=" label ">
                                                <i class="fa fa-user-circle"></i> Nombre
                                            </div>
                                            <p>{{companySeleccionado?.name}} </p>
                                        </div>
                                        <div class="col-xs-6 col-sm-6">
                                            <div class="col-md-4 label"><i class="fa fa-globe"></i>Pais</div>
                                            <p>{{companySeleccionado?.pais.code}} | {{companySeleccionado?.pais.title}}</p>
                                        </div>
                                        
                                        <div class="col-xs-6 col-sm-4">
                                            <div class=" label"><i class="fa fa-calendar-check-o"></i> Creada
                                            </div>
                                            <p>{{companySeleccionado?.created_at | date}}</p>
                                        </div>
                                       <div class="col-xs-12">
                                            <div class=" label ">
                                                <i class="fa fa-user-circle"></i> descripcion
                                            </div>
                                            <p>{{companySeleccionado?.description}} </p>
                                        </div>

                                    </div>
                                </div>
                                <!-- fin detalles -->
                                <!-- subcriptores -->
                                <div class="tab-pane fade show active profile-overview" *ngIf="option_selected === 2 "
                                    id="hijos">
                                    <br />
                                    <div class="row">
                                        <app-eventoscliente [companySelected]="companySelected" (onEventoSeleccionado)="redireccionarEvento($event)"></app-eventoscliente>
                                    </div>
                                </div>
                                <!-- fin subcriptores -->
                                <!-- pagos -->
                                <div class="tab-pane fade show active profile-overview" *ngIf="option_selected === 3 "
                                    id="examenes">
                                    <br />
                                    <div class="row">
                                        <app-listemployees [companySelected]="companySelected"></app-listemployees>
                                    </div>
                                </div>
                            </div>
                            <!-- End Bordered Tabs -->

                        </div>
                    </div>

                </div>
            </div>
        </section>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    (click)="onClose()">Cerrar</button>
            </div>
        </div>
    </div>
</div>

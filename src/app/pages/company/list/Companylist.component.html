<!-- =======| Main |======= -->
<app-loading *ngIf="isLoading"></app-loading>
<div class="container animated fadeInUp" *ngIf="!isLoading" id="main" class="main" role="main" name="users">
    <app-backbreadcum [title]="title"></app-backbreadcum>
    <div class="row animated fadeInUp" >

        <section class="section dashboard">
            <div class="row">
                <!-- buscador -->
                    <form class="form-horizontal col-11">
                        <div class="p-1 bg-light rounded rounded-pill shadow-sm mb-4">
                            <div class="input-group">
                                <input type="search" name="search" type="text" class="form-control col-xs-12"
                                    placeholder="Buscar.." [(ngModel)]="query" aria-describedby="button-addon1"
                                    class="form-control border-0 bg-light">
                                <div class="input-group-append">
                                    <button id="button-addon1" type="submit" class="btn btn-link text-primary"
                                        (click)="search()" name="submit" data-toggle="tooltip" title="mostrar todos"><i
                                            class="fa fa-search"></i></button>
                                    <a href="javascript:;" (click)="PageSize()"
                                        class="btn btn-primary doctor-refresh ms-2 circle"><i
                                            class="fa fa-sync"></i></a>
                                </div>
                            </div>


                        </div>
                        <div class="row" *ngIf="role === 'SUPERADMIN' || role === 'ADMIN' ">
                            <div class="form-group col-xs-12 col-sm-6">

                                <select class="form-control form-select-solid fw-bolder" name="status"
                                    [(ngModel)]="query" (change)="search()" placeholder="status">
                                    <option value="">Status</option>
                                    <option value="PUBLISHED">Publicado</option>
                                    <option value="INACTIVE">Inactivo</option>
                                    <option value="RETIRED">Retirado</option>
                                    <option value="FINISHED">Finalizado</option>
                                </select>
                            </div>
                            <div class="form-group col-xs-12 col-sm-6">

                                <select class="form-control form-select-solid fw-bolder" name="status"
                                    [(ngModel)]="query" (change)="search()" placeholder="status">
                                    <option value="">Destacado</option>
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>
                        </div>
                    </form>
                    <!-- buscador -->
                    <div class="col-1" >
                        <button (click)="openEditModal()" class="btn btn-outline-success" data-toggle="tooltip"
                                data-original-title="Edit" data-bs-toggle="modal" data-bs-target="#editCompany">
                                <i class="fa fa-plus"></i>
                            </button>

                    </div>
            </div>
            <div class="card recent-sales overflow-auto border-radio">

                <div class="card-body">

                    <table [ngClass]="loading? 'table table-borderless datatable':'table table-borderless'">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>País</th>
                                
                                <th class="text-nowrap">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr
                                *ngFor="let company of companies  |  paginate: { itemsPerPage: count, currentPage: p } let i = index;">
                                <td>
                                    <img [src]="company.avatar| imagenPipe: 'companies' " class=" shadow"
                                        style="width: 40px; height: 40px; border-radius: 100px;" alt="">
                                </td>

                                <td>
                                    <a class="cursor" data-toggle="tooltip" data-original-title="Edit"
                                            (click)="openViewDetail(company)"
                                            data-bs-toggle="modal"
                                            data-bs-target="#viewCompany">{{company.name}}</a>

                                </td>
                                 <td>
                                    {{company.pais.code}}
                                </td>
                                <td class="text-nowrap text-center">

                                    <button  class="btn btn-outline-success"
                                            data-toggle="tooltip" data-original-title="Edit"
                                            (click)="onEditProject(company)"
                                            data-bs-toggle="modal"
                                            data-bs-target="#editCompany">
                                            <i class="fa fa-edit"></i>
                                        </button>
                                    <a (click)="eliminarCompany(company.id)" class="cursor" data-toggle="tooltip"
                                        data-original-title="Borrar">
                                        <div class="btn btn-danger"><i class="fa fa-trash"></i></div>
                                    </a>
                                </td>

                            </tr>
                        </tbody>

                    </table>

                    <pagination-controls (pageChange)="p = $event"></pagination-controls>

                </div>

            </div>
        </section>
    </div>

</div>
<!--/main-->
<app-edit (refreshCatList)="loadCompanies()" [companySeleccionado]="companySeleccionado" (closeModal)="onClose()" #editCompany></app-edit>
<app-company-detail [companySeleccionado]="companySeleccionado" #viewCompany></app-company-detail>
